<!-- jarvis-web/src/static/app.html — 홈+회의 통합 셸(SPA) -->
<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
<title>Jarvis</title>
<link rel="icon" type="image/png" href="/icon.png" />
<style>
  :root {
    color-scheme: light dark;
    --bg: #ffffff; --fg: #111418; --muted: #6b7280; --card: #f5f6f8;
    --border: #e5e7eb; --accent: #2563eb; --ko: #0a7e0a; --en: #b04300; --partial: #9aa0a6;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0e1116; --fg: #e8eaed; --muted: #9aa0a6; --card: #161a21;
      --border: #2a2f37; --accent: #60a5fa; --ko: #7ee787; --en: #ffb86b; --partial: #6b7280;
    }
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg);
    font: 16px/1.55 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", "Noto Sans KR", Arial, sans-serif; }
  body { display: flex; flex-direction: column; }
  /* iOS: 100vh 는 동적 툴바 포함 '큰 뷰포트'라 body 자체가 스크롤돼 #chat 와 이중 스크롤이 됨.
     100dvh(실제 보이는 영역) + overflow:hidden 으로 홈은 #chat 만 단일 스크롤. */
  body[data-view="home"] { height: 100vh; height: 100dvh; overflow: hidden; }
  body[data-view="meeting"] { min-height: 100vh; min-height: 100dvh; }

  header {
    position: sticky; top: 0; z-index: 10;
    padding: 12px 16px; border-bottom: 1px solid var(--border); background: var(--bg);
    display: flex; align-items: center; gap: 12px;
  }
  header .title { font-size: 18px; font-weight: 600; }
  .app-icon { width: 26px; height: 26px; border-radius: 6px; flex: none; }
  #meta-badge { font-size: 12px; color: var(--muted); }
  #conn { margin-left: auto; font-size: 13px; opacity: 0.8; }
  #conn.ok { color: var(--ko); opacity: 1; }
  #conn.bad { color: #d33; opacity: 1; }

  button { font-size: 15px; padding: 8px 16px; border-radius: 10px; border: none; background: var(--accent); color: #fff; cursor: pointer; }
  /* 하단 입력 dock */
  #dock {
    position: fixed; left: 0; right: 0; bottom: 0; z-index: 15;
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px calc(10px + env(safe-area-inset-bottom));
    background: var(--bg); border-top: 1px solid var(--border);
  }
  #voice-toggle {
    flex: 1; height: 48px; border-radius: 24px; border: none; cursor: pointer;
    background: #111; color: #fff; font-size: 15px;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  #voice-toggle.active { background: #dc2626; animation: vpulse 1.2s ease-in-out infinite; }
  @keyframes vpulse { 0%, 100% { box-shadow: 0 0 0 0 #dc262688; } 50% { box-shadow: 0 0 0 9px #dc262600; } }
  #dock-plus {
    flex: none; width: 48px; height: 48px; border-radius: 50%; padding: 0; border: none;
    background: var(--accent); color: #fff; font-size: 26px; line-height: 1; cursor: pointer;
  }
  #meeting-stop { height: 48px; border-radius: 24px; background: #dc2626; }
  #mic-src-toggle { flex: 1; height: 48px; border-radius: 24px; border: none; cursor: pointer;
    background: #111; color: #fff; font-size: 15px;
    display: flex; align-items: center; justify-content: center; gap: 8px; }
  #mic-src-toggle.active { background: #dc2626; animation: vpulse 1.2s ease-in-out infinite; }
  body[data-view="home"] #meeting-stop,
  body[data-view="home"] #mic-src-toggle { display: none; }
  body[data-view="meeting"] #voice-toggle,
  body[data-view="meeting"] #dock-plus { display: none; }
  /* + 메뉴 */
  #plus-menu {
    position: fixed; right: 14px; bottom: 76px; z-index: 16;
    display: flex; flex-direction: column; gap: 8px;
    background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 8px;
    box-shadow: 0 4px 16px #0006;
  }
  #plus-menu.hidden { display: none; }
  #plus-menu button { background: var(--card); color: var(--fg); text-align: left; white-space: nowrap; }
  #settings-modal { position: fixed; inset: 0; background: #0008; z-index: 25;
    display: flex; align-items: center; justify-content: center; }
  #settings-modal.hidden { display: none; }
  #settings-modal .sheet { background: var(--bg); color: var(--fg); border: 1px solid var(--border);
    border-radius: 14px; padding: 16px; width: min(92vw, 360px); }
  #settings-modal .sheet-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  #settings-modal .sheet-head button { background: transparent; color: var(--fg); padding: 4px 8px; }
  #settings-modal .sheet-row { margin: 12px 0; }
  #settings-modal .sheet-label { font-size: 13px; color: var(--muted); margin-bottom: 6px; }
  #settings-modal label { margin-right: 16px; font-size: 15px; cursor: pointer; }
  #sound-hint { position: fixed; top: 60px; left: 50%; transform: translateX(-50%); z-index: 30;
    background: var(--accent); color: #fff; padding: 8px 16px; border-radius: 999px; font-size: 14px;
    cursor: pointer; box-shadow: 0 2px 10px #0005; }
  #sound-hint.hidden { display: none; }
  /* dock 가림 방지: 독 높이(버튼48+패딩) + iOS 안전영역 만큼 하단 여백.
     ※ #chat/#log 의 padding 단축속성이 이 값을 덮으므로, 각 단축속성의 하단값으로 직접 지정(아래). */

  /* 뷰 토글 */
  #home-view, #meeting-view { flex: 1; min-height: 0; display: flex; flex-direction: column; }
  body[data-view="home"] #meeting-view { display: none; }
  body[data-view="meeting"] #home-view { display: none; }

  /* 홈 채팅 */
  #chat { flex: 1; padding: 12px 12px calc(88px + env(safe-area-inset-bottom)); overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
  .bubble { max-width: 80%; padding: 8px 12px; border-radius: 14px; white-space: pre-wrap; line-height: 1.4; }
  .bubble.user { align-self: flex-end; background: var(--accent); color: #fff; }
  .bubble.assistant { align-self: flex-start; background: #8883; }
  .bubble.draft { opacity: 0.6; }
  .bubble.draft::after { content: "▍"; margin-left: 2px; animation: blink 1s steps(2, start) infinite; }

  /* 회의 자막 */
  #log { flex: 1; padding: 16px 16px calc(88px + env(safe-area-inset-bottom)); max-width: 980px; margin: 0 auto; width: 100%; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 12px 14px; margin: 10px 0; }
  .card.draft { background: transparent; border: 1px dashed var(--border); color: var(--partial); }
  .card.draft .src { color: var(--partial); }
  .src { font-size: 18px; }
  .tx { font-size: 17px; margin-top: 6px; }
  .tx.ko { color: var(--ko); }
  .tx.en { color: var(--en); }
  .info { color: var(--muted); font-size: 13px; }
  .draft .src::after { content: "▍"; display: inline-block; margin-left: 4px; animation: blink 1s steps(2, start) infinite; opacity: 0.6; }
  @keyframes blink { to { visibility: hidden; } }
  .lockbar { position: fixed; bottom: calc(100px + env(safe-area-inset-bottom)); left: 50%; transform: translateX(-50%);
    background: var(--accent); color: white; padding: 6px 14px; border-radius: 999px;
    font-size: 13px; cursor: pointer; opacity: 0; pointer-events: none; transition: opacity .2s; }
  .lockbar.show { opacity: 1; pointer-events: auto; }
  @media (max-width: 600px) { .src { font-size: 17px; } .tx { font-size: 16px; } }

  #login { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column;
    gap: 16px; align-items: center; justify-content: center; z-index: 50; }
  #login input { font-size: 16px; padding: 12px; width: 240px; border-radius: 8px; border: 1px solid #888; box-sizing: border-box; }
  #login button { font-size: 18px; font-weight: 600; padding: 14px; width: 240px; border-radius: 10px;
    border: none; background: var(--accent); color: #fff; cursor: pointer; box-sizing: border-box; }
  #meeting-loading { position: fixed; inset: 0; background: var(--bg); z-index: 60;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; }
  #meeting-loading .spinner { width: 42px; height: 42px; border: 4px solid #8884;
    border-top-color: var(--accent); border-radius: 50%; animation: spin 0.9s linear infinite; }
  #meeting-loading .lbl { color: var(--muted); font-size: 15px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  #mode-toast { position: fixed; top: 64px; left: 50%; transform: translateX(-50%) translateY(-8px);
    background: var(--accent); color: #fff; padding: 8px 16px; border-radius: 999px; font-size: 14px;
    z-index: 40; opacity: 0; pointer-events: none; transition: opacity .25s, transform .25s; box-shadow: 0 2px 10px #0005; }
  #mode-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  @keyframes viewfade { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
  #voice-toggle:disabled { opacity: 0.45; cursor: not-allowed; animation: none; }
  /* jarvis 다운 시 모든 액션 버튼 비활성(로그인 제외) */
  body.server-down #voice-toggle,
  body.server-down #dock-plus,
  body.server-down #mic-src-toggle,
  body.server-down #meeting-stop,
  body.server-down #plus-menu button { opacity: 0.45; pointer-events: none; cursor: not-allowed; animation: none; }
  .hidden { display: none !important; }
</style>
</head>
<body data-view="home">
  <div id="login">
    <div>🔒 Jarvis 로그인</div>
    <input id="login-pw" type="password" placeholder="password" />
    <button id="login-go">들어가기</button>
  </div>
  <div id="meeting-loading" class="hidden">
    <div class="spinner"></div>
    <div class="lbl">회의 준비 중…</div>
  </div>
  <div id="mode-toast"></div>

  <header>
    <img class="app-icon" src="/icon.png" alt="" />
    <span class="title" id="title">Jarvis</span>
    <span id="meta-badge"></span>
    <span id="conn">···</span>
  </header>
  <div id="sound-hint" class="hidden">🔊 탭하여 소리 켜기</div>

  <div id="home-view">
    <main id="chat"></main>
  </div>
  <div id="meeting-view">
    <main id="log"></main>
    <div class="lockbar" id="lockbar">↓ 새 자막 보기</div>
  </div>

  <div id="plus-menu" class="hidden">
    <button id="menu-meet">🎤 미팅모드</button>
    <button id="menu-settings">⚙️ 설정</button>
  </div>
  <div id="settings-modal" class="hidden">
    <div class="sheet">
      <div class="sheet-head"><b>설정</b><button id="settings-close">✕</button></div>
      <div class="sheet-row">
        <div class="sheet-label">미팅 번역</div>
        <label><input type="radio" name="set-translate" value="deepseek"> 딥시크</label>
        <label><input type="radio" name="set-translate" value="local"> 로컬</label>
      </div>
      <div class="sheet-row">
        <div class="sheet-label">미팅 STT</div>
        <label><input type="radio" name="set-stt" value="gladia"> Gladia</label>
        <label><input type="radio" name="set-stt" value="local"> 로컬</label>
      </div>
      <div class="sheet-row">
        <div class="sheet-label">일반 대화 STT</div>
        <label><input type="radio" name="set-conv-stt" value="gladia"> Gladia</label>
        <label><input type="radio" name="set-conv-stt" value="local"> 로컬</label>
      </div>
      <div class="sheet-row">
        <div class="sheet-label">일반 대화 LLM</div>
        <label><input type="radio" name="set-conv-llm" value="deepseek"> 딥시크</label>
        <label><input type="radio" name="set-conv-llm" value="local"> 로컬</label>
      </div>
    </div>
  </div>
  <div id="dock">
    <button id="voice-toggle" aria-label="음성 대화">
      <svg width="22" height="22" viewBox="0 0 22 22" aria-hidden="true">
        <rect x="3" y="8" width="2.5" height="6" rx="1.25" fill="currentColor"/>
        <rect x="7.5" y="5" width="2.5" height="12" rx="1.25" fill="currentColor"/>
        <rect x="12" y="3" width="2.5" height="16" rx="1.25" fill="currentColor"/>
        <rect x="16.5" y="7" width="2.5" height="8" rx="1.25" fill="currentColor"/>
      </svg>
      <span>음성으로 대화</span>
    </button>
    <button id="dock-plus" aria-label="메뉴">+</button>
    <button id="mic-src-toggle" aria-label="폰 마이크 입력">
      <svg width="22" height="22" viewBox="0 0 22 22" aria-hidden="true">
        <rect x="3" y="8" width="2.5" height="6" rx="1.25" fill="currentColor"/>
        <rect x="7.5" y="5" width="2.5" height="12" rx="1.25" fill="currentColor"/>
        <rect x="12" y="3" width="2.5" height="16" rx="1.25" fill="currentColor"/>
        <rect x="16.5" y="7" width="2.5" height="8" rx="1.25" fill="currentColor"/>
      </svg>
      <span>폰 마이크</span>
    </button>
    <button id="meeting-stop">🛑 회의 종료</button>
  </div>

<script>
(() => {
  const ADMIN_KEY = "jarvis_admin_pw";
  const TARGET_SR = 16000;
  const name = decodeURIComponent(location.pathname.replace(/^\//, "").replace(/\/.*$/, "")) || "jarvis";
  const $ = (id) => document.getElementById(id);

  // ---- 로그인 ----
  function getPw() { return localStorage.getItem(ADMIN_KEY) || ""; }
  function showLogin() { $("login").classList.remove("hidden"); }
  function hideLogin() { $("login").classList.add("hidden"); }
  $("login-go").addEventListener("click", () => {
    ensureAudio();
    const pw = $("login-pw").value.trim();
    if (!pw) return;
    localStorage.setItem(ADMIN_KEY, pw);
    hideLogin();
    connect();
  });

  // ---- 뷰 전환 (리로드 없음) ----
  let meetingTitle = "Meeting";   // applyMeta 가 갱신; 제목은 뷰에 따라 표시
  let micSource = "system";          // 회의 입력 소스 (system|remote) — 토글 라벨용
  function setView(v) {
    const nv = (v === "meeting" ? "meeting" : "home");
    document.body.dataset.view = nv;
    $("title").textContent = nv === "meeting" ? meetingTitle : "Jarvis";
    $("plus-menu").classList.add("hidden");   // 뷰 전환 시 메뉴 닫기
  }
  let modeToastTimer = null;
  function showModeToast(text) {
    const t = $("mode-toast");
    t.textContent = text; t.classList.add("show");
    clearTimeout(modeToastTimer);
    modeToastTimer = setTimeout(() => t.classList.remove("show"), 1500);
  }
  function showView(v) {
    const nv = (v === "meeting" ? "meeting" : "home");
    if (document.body.dataset.view === nv) return;
    setView(nv);   // URL 은 /{name} 유지 — /meeting 은 공개 뷰어
    const el = nv === "meeting" ? $("meeting-view") : $("home-view");
    el.style.animation = "none"; void el.offsetWidth; el.style.animation = "viewfade .25s ease";
    showModeToast(nv === "meeting" ? "🎤 회의 모드" : "💬 일반 모드");
  }
  function curView() { return document.body.dataset.view === "meeting" ? "meeting" : "home"; }

  // ---- TTS Audio + 채팅 버블 (홈) ----
  let audioCtx = null, playHead = 0, keepAlive = null;
  function soundHint(show) { const h = $("sound-hint"); if (h) h.classList.toggle("hidden", !show); }
  function ensureAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === "suspended") audioCtx.resume();
    if (!keepAlive) {   // 무음 keep-alive — iOS 가 유휴 시 컨텍스트를 일시중단하지 않게
      const buf = audioCtx.createBuffer(1, Math.round(audioCtx.sampleRate), audioCtx.sampleRate);
      keepAlive = audioCtx.createBufferSource();
      keepAlive.buffer = buf; keepAlive.loop = true;
      keepAlive.connect(audioCtx.destination);
      try { keepAlive.start(); } catch {}
    }
    if (audioCtx.state === "running") soundHint(false);
  }
  // 어떤 제스처든 오디오 재개(autoplay 정책 — 접속만 한 패시브 뷰어용)
  ["touchend", "click"].forEach((e) => document.addEventListener(e, ensureAudio));
  function playAudio(buf) {
    ensureAudio();
    if (audioCtx.state !== "running") soundHint(true);   // 제스처 전 — 탭하여 소리 켜기 안내
    const sr = new DataView(buf).getUint32(0, true);
    const pcm = new Int16Array(buf, 4);
    const f32 = new Float32Array(pcm.length);
    for (let i = 0; i < pcm.length; i++) f32[i] = pcm[i] / 32768;
    const ab = audioCtx.createBuffer(1, f32.length, sr);
    ab.copyToChannel(f32, 0);
    const s = audioCtx.createBufferSource();
    s.buffer = ab; s.connect(audioCtx.destination);
    const t = Math.max(audioCtx.currentTime, playHead);
    s.start(t); playHead = t + ab.duration;
  }
  let lastRole = null, lastBubble = null, chatDraft = null;
  function addText(role, text) {
    const chat = $("chat");
    if (role === lastRole && lastBubble) { lastBubble.textContent += " " + text; }
    else {
      const b = document.createElement("div");
      b.className = "bubble " + role; b.textContent = text;
      chat.appendChild(b); lastRole = role; lastBubble = b;
    }
    chat.scrollTop = chat.scrollHeight;
  }

  // ---- 회의 자막 (meeting) ----
  let lastCard = null, draftCard = null, lockedToBottom = true;
  window.addEventListener("scroll", () => {
    const nearBottom = window.innerHeight + window.scrollY >= document.body.scrollHeight - 80;
    lockedToBottom = nearBottom;
    $("lockbar").classList.toggle("show", !nearBottom);
  });
  $("lockbar").addEventListener("click", () => {
    lockedToBottom = true;
    window.scrollTo({ top: document.body.scrollHeight, behavior: "smooth" });
    $("lockbar").classList.remove("show");
  });
  function scrollIfLocked() { if (lockedToBottom) window.scrollTo({ top: document.body.scrollHeight }); }
  function applyMeta(meta) {
    if (!meta) return;
    const user = meta.user || "?";
    meetingTitle = meta.partner ? `${meta.partner} ↔ ${user}` : "Meeting";
    if (document.body.dataset.view === "meeting") $("title").textContent = meetingTitle;
    const tags = [];
    if (meta.partner_lang) tags.push(`${meta.partner}: ${meta.partner_lang}`);
    if (meta.user_lang) tags.push(`${user}: ${meta.user_lang}`);
    $("meta-badge").textContent = tags.join(" · ");
  }
  function newCard() {
    const card = document.createElement("section");
    card.className = "card";
    $("log").appendChild(card);
    return card;
  }
  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, (c) => ({
      "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
    }[c]));
  }

  // ---- 이벤트 디스패치 (홈+회의 통합) ----
  function handle(ev) {
    switch (ev.kind) {
      case "user":
        if (chatDraft) {   // 조합중 버블을 최종으로 확정
          chatDraft.classList.remove("draft");
          chatDraft.textContent = ev.text || "";
          lastRole = "user"; lastBubble = chatDraft; chatDraft = null;
          $("chat").scrollTop = $("chat").scrollHeight;
        } else {
          addText("user", ev.text || "");
        }
        return;
      case "assistant": addText("assistant", ev.text || ""); return;
      case "navigate":
        showView(ev.text); mic.apply();
        if (ev.text === "meeting") hideMeetingLoading();
        return;
      case "hello": applyMeta(ev.meta); setServerUp(true); return;
      case "info": {
        const card = newCard();
        card.innerHTML = `<div class="info">${escapeHtml(ev.text || "")}</div>`;
        lastCard = null;
        break;
      }
      case "source": {
        let card;
        if (draftCard) {
          card = draftCard; card.classList.remove("draft");
          card.innerHTML = `<div class="src">🧑 ${escapeHtml(ev.text || "")}</div>`;
          draftCard = null;
        } else {
          card = newCard();
          card.innerHTML = `<div class="src">🧑 ${escapeHtml(ev.text || "")}</div>`;
        }
        lastCard = card;
        break;
      }
      case "translation_ko":
      case "translation_en": {
        const cls = ev.kind === "translation_ko" ? "ko" : "en";
        const sym = ev.kind === "translation_ko" ? "🌐" : "🇺🇸";
        const html = `<div class="tx ${cls}">${sym} ${escapeHtml(ev.text || "")}</div>`;
        if (lastCard) { lastCard.insertAdjacentHTML("beforeend", html); }
        else { const card = newCard(); card.innerHTML = html; lastCard = card; }
        break;
      }
      case "partial": {
        if (document.body.dataset.view !== "meeting") {   // 홈 채팅 조합중 버블
          if (!chatDraft) {
            chatDraft = document.createElement("div");
            chatDraft.className = "bubble user draft";
            $("chat").appendChild(chatDraft);
          }
          chatDraft.textContent = ev.text || "";
          $("chat").scrollTop = $("chat").scrollHeight;
          return;
        }
        if (!draftCard) { draftCard = newCard(); draftCard.classList.add("draft"); }
        draftCard.innerHTML = `<div class="src">🧑 ${escapeHtml(ev.text || "")}</div>`;
        scrollIfLocked();
        return;
      }
      case "gap":
        lastCard = null;
        if (draftCard) { draftCard.remove(); draftCard = null; }
        return;
      case "end": {
        const card = newCard();
        card.innerHTML = `<div class="info">— 회의 종료 —</div>`;
        setServerUp(false);
        break;
      }
      case "kicked": {
        const card = newCard();
        card.innerHTML = `<div class="info">— 새 publisher 가 채널을 인수했습니다 —</div>`;
        break;
      }
      case "publisher_disconnected": {
        setServerUp(false);
        return;
      }
      case "settings":
        try { fillSettings(JSON.parse(ev.text || "{}")); } catch {}
        return;
      case "mic_release":
        voiceOn = false;
        $("voice-toggle").classList.remove("active");
        mic.apply();      // 의도적 중단(gen 가드 → onLost 미발화 → 얼럿 없음)
        return;
      case "mic_source":
        micSource = ev.source || "system";
        $("mic-src-toggle").classList.toggle("active", micSource === "remote");   // 붉은=폰
        mic.apply();   // 낙관적 클릭과 어긋났으면 서버값으로 수렴
        return;
      default: return;
    }
    scrollIfLocked();
  }

  // ---- 구독 WS (홈+회의 공용) ----
  let ws = null, reconnectDelay = 500;
  function connect() {
    const pw = getPw();
    if (!pw) { showLogin(); return; }
    const proto = location.protocol === "https:" ? "wss:" : "ws:";
    ws = new WebSocket(`${proto}//${location.host}/subscribe/${encodeURIComponent(name)}?token=${encodeURIComponent(pw)}`);
    ws.binaryType = "arraybuffer";
    let opened = false;
    ws.addEventListener("open", () => {
      opened = true;
      $("conn").textContent = "● live";
      $("conn").classList.remove("bad"); $("conn").classList.add("ok");
      reconnectDelay = 500;
    });
    ws.addEventListener("message", (m) => {
      if (m.data instanceof ArrayBuffer) { playAudio(m.data); return; }
      try { handle(JSON.parse(m.data)); } catch (e) { console.error("bad message", e, m.data); }
    });
    ws.addEventListener("close", (e) => {
      // 1008=서버 인증 거부, 또는 한 번도 열리지 않은 1006(업그레이드 401) → 진짜 인증 실패.
      // 열렸던 소켓의 1006 은 네트워크 끊김(모바일 화면잠금 등) → 자격증명 유지하고 재연결.
      if (e.code === 1008 || (!opened && e.code === 1006)) {
        localStorage.removeItem(ADMIN_KEY);
        $("conn").textContent = "인증 필요"; $("conn").classList.add("bad");
        showLogin();
        return;
      }
      $("conn").textContent = `재연결 (${reconnectDelay/1000}s)…`;
      $("conn").classList.remove("ok"); $("conn").classList.add("bad");
      setTimeout(connect, reconnectDelay);
      reconnectDelay = Math.min(reconnectDelay * 2, 8000);
    });
    ws.addEventListener("error", () => { try { ws.close(); } catch {} });
  }

  function downsample(input, inRate) {
    if (inRate === TARGET_SR) return input;
    const ratio = inRate / TARGET_SR, outLen = Math.floor(input.length / ratio);
    const out = new Float32Array(outLen);
    for (let i = 0; i < outLen; i++) out[i] = input[Math.floor(i * ratio)];
    return out;
  }
  function floatToInt16(f32) {
    const out = new Int16Array(f32.length);
    for (let i = 0; i < f32.length; i++) {
      const s = Math.max(-1, Math.min(1, f32[i]));
      out[i] = s < 0 ? s * 0x8000 : s * 0x7fff;
    }
    return out;
  }
  // ---- 마이크 캡처 객체: 단일 진입점 apply() + generation 가드 ----
  function createMic(deps) {
    let ws = null, node = null, stream = null, wakeLock = null;
    let gen = 0, capturing = false;

    function _teardownAudio() {
      if (node) { try { node.disconnect(); } catch {} node.onaudioprocess = null; node = null; }
      if (stream) { try { stream.getTracks().forEach((t) => t.stop()); } catch {} stream = null; }
    }
    function _teardownSocket(sendStop) {
      if (ws) {
        if (sendStop) { try { if (ws.readyState === 1) ws.send(JSON.stringify({ kind: "mic_stop" })); } catch {} }
        try { ws.close(); } catch {}
        ws = null;
      }
    }
    function _releaseWakeLock() {
      if (wakeLock) { try { wakeLock.release(); } catch {} wakeLock = null; }
    }
    async function _acquireWakeLock(myGen) {
      try {
        if ("wakeLock" in navigator) {
          const wl = await navigator.wakeLock.request("screen");
          if (myGen !== gen) { try { wl.release(); } catch {} return; }
          wakeLock = wl;
          wakeLock.addEventListener("release", () => { wakeLock = null; });
        }
      } catch {}
    }

    async function _start() {
      const myGen = ++gen;
      capturing = true;
      const pw = deps.getPw();
      if (!pw) { deps.onLost("auth"); return; }
      _teardownSocket(false);
      const proto = location.protocol === "https:" ? "wss:" : "ws:";
      ws = new WebSocket(`${proto}//${deps.host}/mic/${encodeURIComponent(deps.name)}?token=${encodeURIComponent(pw)}`);
      ws.binaryType = "arraybuffer";
      let opened = false;
      ws.onopen = () => { if (myGen !== gen) return; opened = true; ws.send(JSON.stringify({ kind: "mic_start" })); };
      ws.onmessage = (e) => { if (myGen !== gen) return; try { if (JSON.parse(e.data).kind === "kicked") deps.onLost("kicked"); } catch {} };
      ws.onclose = (e) => {
        if (myGen !== gen) return;
        if (e.code === 1008 || (!opened && e.code === 1006)) deps.onLost("auth");
        else deps.onLost("closed");
      };
      let s;
      try {
        s = await navigator.mediaDevices.getUserMedia({ audio: { channelCount: 1, echoCancellation: true, noiseSuppression: true } });
      } catch (err) {
        if (myGen === gen) deps.onLost("mic-permission");
        return;
      }
      if (myGen !== gen) { try { s.getTracks().forEach((t) => t.stop()); } catch {} return; }
      stream = s;
      deps.ensureAudio();
      const ctx = deps.getAudioCtx();
      const srcNode = ctx.createMediaStreamSource(stream);
      node = ctx.createScriptProcessor(4096, 1, 1);
      srcNode.connect(node); node.connect(ctx.destination);
      await _acquireWakeLock(myGen);
      node.onaudioprocess = (ev) => {
        if (myGen !== gen) return;
        if (!ws || ws.readyState !== 1) return;
        ws.send(deps.floatToInt16(deps.downsample(ev.inputBuffer.getChannelData(0), ctx.sampleRate)).buffer);
      };
    }

    function _stop() {
      gen++;
      capturing = false;
      _teardownAudio();
      _teardownSocket(true);
      _releaseWakeLock();
      const ctx = deps.getAudioCtx();
      if (ctx && ctx.state === "suspended") ctx.resume();
    }

    function apply() {
      const want = deps.shouldCapture();
      if (want && !capturing) _start();
      else if (!want && capturing) _stop();
    }

    document.addEventListener("visibilitychange", () => {
      if (capturing && wakeLock === null && document.visibilityState === "visible") _acquireWakeLock(gen);
    });

    return { apply, isCapturing: () => capturing };
  }
  // ---- 제어 채널(웹 → jarvis) one-shot 전송 ----
  function sendControl(obj) {
    const pw = getPw();
    if (!pw) return;
    const proto = location.protocol === "https:" ? "wss:" : "ws:";
    try {
      const cws = new WebSocket(`${proto}//${location.host}/control/${encodeURIComponent(name)}?token=${encodeURIComponent(pw)}`);
      cws.onopen = () => {
        try { cws.send(JSON.stringify(obj)); }
        finally { setTimeout(() => { try { cws.close(); } catch {} }, 200); }
      };
      cws.onerror = () => {};
    } catch {}
  }

  // ---- 회의 종료 (웹 → control) ----
  $("meeting-stop").addEventListener("click", () => {
    if (!getPw()) { showLogin(); return; }
    sendControl({ kind: "meeting_stop" });
  });
  // ---- 회의 입력 소스 토글 (검정=시스템 / 붉은=폰 — 폰이면 폰 마이크 즉시 스트리밍) ----
  $("mic-src-toggle").addEventListener("click", () => {
    if (!getPw()) { showLogin(); return; }
    ensureAudio();
    micSource = (micSource === "remote") ? "system" : "remote";
    $("mic-src-toggle").classList.toggle("active", micSource === "remote");
    sendControl({ kind: micSource === "remote" ? "mic_phone" : "mic_system" });
    mic.apply();
  });
  // ---- + 기능 메뉴 ----
  $("dock-plus").addEventListener("click", (e) => {
    e.stopPropagation();
    $("plus-menu").classList.toggle("hidden");
  });
  let meetingLoadTimer = null;
  function showMeetingLoading() {
    $("meeting-loading").classList.remove("hidden");
    clearTimeout(meetingLoadTimer);
    meetingLoadTimer = setTimeout(() => {
      hideMeetingLoading();
      alert("회의 시작에 실패했어요. 다시 시도해주세요.");
    }, 10000);
  }
  function hideMeetingLoading() {
    clearTimeout(meetingLoadTimer); meetingLoadTimer = null;
    $("meeting-loading").classList.add("hidden");
  }
  $("menu-meet").addEventListener("click", () => {
    if (!getPw()) { showLogin(); return; }
    showMeetingLoading();
    sendControl({ kind: "meeting_start" });
    $("plus-menu").classList.add("hidden");
  });
  // ---- 설정 모달 ----
  function fillSettings(s) {
    document.querySelectorAll('input[name="set-translate"]').forEach((r) => { r.checked = (r.value === s.translate_backend); });
    document.querySelectorAll('input[name="set-stt"]').forEach((r) => { r.checked = (r.value === s.stt_backend); });
    document.querySelectorAll('input[name="set-conv-stt"]').forEach((r) => { r.checked = (r.value === s.conversation_stt_backend); });
    document.querySelectorAll('input[name="set-conv-llm"]').forEach((r) => { r.checked = (r.value === s.conversation_llm_backend); });
  }
  function curSettings() {
    const t = document.querySelector('input[name="set-translate"]:checked');
    const s = document.querySelector('input[name="set-stt"]:checked');
    const c = document.querySelector('input[name="set-conv-stt"]:checked');
    const l = document.querySelector('input[name="set-conv-llm"]:checked');
    return { translate_backend: t ? t.value : "deepseek", stt_backend: s ? s.value : "gladia",
             conversation_stt_backend: c ? c.value : "local",
             conversation_llm_backend: l ? l.value : "deepseek" };
  }
  $("menu-settings").addEventListener("click", () => {
    $("plus-menu").classList.add("hidden");
    if (!getPw()) { showLogin(); return; }
    $("settings-modal").classList.remove("hidden");
    sendControl({ kind: "get_settings" });
  });
  $("settings-close").addEventListener("click", () => $("settings-modal").classList.add("hidden"));
  $("settings-modal").addEventListener("click", (e) => { if (e.target === $("settings-modal")) $("settings-modal").classList.add("hidden"); });
  document.querySelectorAll('#settings-modal input[type="radio"]').forEach((r) =>
    r.addEventListener("change", () => sendControl({ kind: "apply_settings", value: curSettings() }))
  );
  document.addEventListener("click", (e) => {
    const menu = $("plus-menu");
    if (!menu.classList.contains("hidden") && !menu.contains(e.target) && e.target !== $("dock-plus")) {
      menu.classList.add("hidden");
    }
  });

  // ---- 서버 상태 추적 ----
  let serverUp = true;
  function setServerUp(up) {
    serverUp = up;
    document.body.classList.toggle("server-down", !up);   // CSS 가 모든 액션 버튼 비활성
    if (up) {
      $("conn").textContent = "● live";
      $("conn").classList.remove("bad"); $("conn").classList.add("ok");
    } else {
      $("conn").textContent = "⚠ 서버 꺼짐";
      $("conn").classList.remove("ok"); $("conn").classList.add("bad");
      $("plus-menu").classList.add("hidden");        // 열린 메뉴/설정/로딩 닫기
      $("settings-modal").classList.add("hidden");
      hideMeetingLoading();
      if (voiceOn) { voiceOn = false; $("voice-toggle").classList.remove("active"); mic.apply(); }
    }
  }
  // ---- 음성 토글 (핸즈프리: 마이크 ON + 즉시 청취, 타임아웃 없음) ----
  let voiceOn = false;
  $("voice-toggle").addEventListener("click", () => {
    const pw = getPw();
    if (!pw) { showLogin(); return; }
    ensureAudio();
    voiceOn = !voiceOn;
    $("voice-toggle").classList.toggle("active", voiceOn);
    sendControl({ kind: voiceOn ? "listen_start" : "listen_stop" });
    mic.apply();
  });

  // ---- 초기화 ----
  function onMicLost(reason) {
    if (curView() === "home") { voiceOn = false; $("voice-toggle").classList.remove("active"); }
    else { micSource = "system"; $("mic-src-toggle").classList.remove("active"); }
    mic.apply();
    if (reason === "auth") { localStorage.removeItem(ADMIN_KEY); showLogin(); }
    else if (reason === "mic-permission") alert("마이크 권한 실패 — 권한을 허용해주세요.");
  }

  const mic = createMic({
    getPw, host: location.host, name,
    ensureAudio, getAudioCtx: () => audioCtx,
    floatToInt16, downsample,
    shouldCapture: () => (curView() === "home" && voiceOn) || (curView() === "meeting" && micSource === "remote"),
    onLost: onMicLost,
  });

  setView("home");
  if (getPw()) { hideLogin(); connect(); } else { showLogin(); }
})();
</script>
</body>
</html>
