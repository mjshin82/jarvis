<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Meeting Live Captions</title>
<style>
  :root {
    color-scheme: light dark;
    --bg: #ffffff;
    --fg: #111418;
    --muted: #6b7280;
    --card: #f5f6f8;
    --border: #e5e7eb;
    --accent: #2563eb;
    --ko: #0a7e0a;
    --en: #b04300;
    --partial: #9aa0a6;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0e1116;
      --fg: #e8eaed;
      --muted: #9aa0a6;
      --card: #161a21;
      --border: #2a2f37;
      --accent: #60a5fa;
      --ko: #7ee787;
      --en: #ffb86b;
      --partial: #6b7280;
    }
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg);
    font: 16px/1.55 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue",
      "Noto Sans KR", Arial, sans-serif; }
  body { min-height: 100vh; display: flex; flex-direction: column; }
  header {
    position: sticky; top: 0; z-index: 10;
    padding: 12px 16px; border-bottom: 1px solid var(--border);
    background: var(--bg);
    display: flex; align-items: center; gap: 12px;
  }
  header .title { font-size: 18px; font-weight: 600; }
  header .badge { font-size: 12px; color: var(--muted); margin-left: auto; }
  header .conn { font-size: 12px; }
  header .conn.ok { color: var(--ko); }
  header .conn.bad { color: #d33; }
  main {
    flex: 1; padding: 16px;
    max-width: 980px; margin: 0 auto; width: 100%;
  }
  .card {
    background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    padding: 12px 14px; margin: 10px 0;
  }
  /* 조합 중(미확정) 카드: 점선 테두리 + 흐릿한 색으로 한눈에 구분 */
  .card.draft {
    background: transparent;
    border: 1px dashed var(--border);
    color: var(--partial);
  }
  .card.draft .src { color: var(--partial); }
  .src { font-size: 18px; }
  .tx { font-size: 17px; margin-top: 6px; }
  .tx.ko { color: var(--ko); }
  .tx.en { color: var(--en); }
  .info { color: var(--muted); font-size: 13px; }
  .meta { color: var(--muted); font-size: 12px; margin-top: 4px; }
  /* 깜빡이는 점 — 진행 중이라는 신호 */
  .draft .src::after {
    content: "▍"; display: inline-block; margin-left: 4px;
    animation: blink 1s steps(2, start) infinite;
    opacity: 0.6;
  }
  @keyframes blink { to { visibility: hidden; } }
  .lockbar {
    position: fixed; bottom: 48px; left: 50%; transform: translateX(-50%);
    background: var(--accent); color: white; padding: 6px 14px; border-radius: 999px;
    font-size: 13px; cursor: pointer; opacity: 0; pointer-events: none; transition: opacity .2s;
  }
  .lockbar.show { opacity: 1; pointer-events: auto; }
  @media (max-width: 600px) {
    .src { font-size: 17px; } .tx { font-size: 16px; }
  }
  #admin-bar { display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
               padding: 6px 12px; border-bottom: 1px solid #8883; font-size: 13px; }
  #admin-bar button { font-size: 13px; padding: 6px 12px; border-radius: 8px; border: none;
                      background: #2563eb; color: #fff; cursor: pointer; }
  #admin-bar button.off { background: #dc2626; }
  #admin-bar input { font-size: 13px; padding: 6px; width: 160px; }
  #mic-src { padding: 3px 8px; border-radius: 6px; background: #8882; }
  #mic-src.remote { background: #22c55e; color: #03240f; }
  #mic-level { width: 120px; height: 8px; background: #ddd4; border-radius: 4px; overflow: hidden; }
  #mic-bar { height: 100%; width: 0%; background: #22c55e; }
  .admin-hidden { display: none !important; }
</style>
</head>
<body>
  <header>
    <div class="title" id="title">🎤 회의 자막</div>
    <div class="badge" id="meta-badge"></div>
    <div class="conn" id="conn">···</div>
  </header>
  <div id="admin-bar">
    <button id="admin-toggle">🔒 admin</button>
    <input id="admin-pw" type="password" placeholder="admin password" class="admin-hidden" />
    <button id="admin-unlock" class="admin-hidden">잠금 해제</button>
    <button id="mic-toggle" class="admin-hidden">🎙️ 마이크 켜기</button>
    <div id="mic-level" class="admin-hidden"><div id="mic-bar"></div></div>
    <span id="mic-src"></span>
  </div>
  <main id="log"></main>
  <div class="lockbar" id="lockbar">↓ 새 자막 보기</div>

<script>
(() => {
  const key = location.pathname.replace(/^\/m\//, "");
  const log = document.getElementById("log");
  const titleEl = document.getElementById("title");
  const metaBadge = document.getElementById("meta-badge");
  const connEl = document.getElementById("conn");
  const lockbar = document.getElementById("lockbar");

  let lastCard = null;     // 직전 확정 카드(source 가 만든 것) — 번역 카드를 여기에 붙임
  let draftCard = null;    // 현재 진행 중 partial 카드 (확정 source 오면 정식 카드로 전환)
  let lockedToBottom = true;
  let publisherConnected = false;

  // 스크롤 잠금: 사용자가 위로 스크롤하면 자동 스크롤 OFF
  window.addEventListener("scroll", () => {
    const nearBottom = window.innerHeight + window.scrollY >= document.body.scrollHeight - 80;
    lockedToBottom = nearBottom;
    lockbar.classList.toggle("show", !nearBottom);
  });
  lockbar.addEventListener("click", () => {
    lockedToBottom = true;
    window.scrollTo({ top: document.body.scrollHeight, behavior: "smooth" });
    lockbar.classList.remove("show");
  });
  function scrollIfLocked() {
    if (lockedToBottom) {
      window.scrollTo({ top: document.body.scrollHeight });
    }
  }

  function applyMeta(meta) {
    if (!meta) return;
    const partner = meta.partner || "?";
    const user = meta.user || "?";
    titleEl.textContent = `🎤 ${partner} ↔ ${user}`;
    const tags = [];
    if (meta.partner_lang) tags.push(`${partner}: ${meta.partner_lang}`);
    if (meta.user_lang) tags.push(`${user}: ${meta.user_lang}`);
    metaBadge.textContent = tags.join(" · ");
  }

  function newCard() {
    const card = document.createElement("section");
    card.className = "card";
    log.appendChild(card);
    return card;
  }

  function handle(ev) {
    switch (ev.kind) {
      case "hello":
        applyMeta(ev.meta);
        return;
      case "info": {
        const card = newCard();
        card.innerHTML = `<div class="info">${escapeHtml(ev.text || "")}</div>`;
        lastCard = null;
        break;
      }
      case "source": {
        // partial 로 만든 draft 가 있으면 그걸 확정 카드로 승격 — 카드 위치가 안 바뀜
        let card;
        if (draftCard) {
          card = draftCard;
          card.classList.remove("draft");
          card.innerHTML = `<div class="src">🧑 ${escapeHtml(ev.text || "")}</div>`;
          draftCard = null;
        } else {
          card = newCard();
          card.innerHTML = `<div class="src">🧑 ${escapeHtml(ev.text || "")}</div>`;
        }
        lastCard = card;
        break;
      }
      case "translation_ko":
      case "translation_en": {
        const cls = ev.kind === "translation_ko" ? "ko" : "en";
        const sym = ev.kind === "translation_ko" ? "🌐" : "🇺🇸";
        const html = `<div class="tx ${cls}">${sym} ${escapeHtml(ev.text || "")}</div>`;
        if (lastCard) {
          lastCard.insertAdjacentHTML("beforeend", html);
        } else {
          const card = newCard();
          card.innerHTML = html;
          lastCard = card;
        }
        break;
      }
      case "partial": {
        // 진행 중 카드(draft) 를 본문에 인라인으로 표시/업데이트.
        // source 가 오면 같은 카드가 확정 카드로 승격된다.
        if (!draftCard) {
          draftCard = newCard();
          draftCard.classList.add("draft");
        }
        draftCard.innerHTML = `<div class="src">🧑 ${escapeHtml(ev.text || "")}</div>`;
        scrollIfLocked();
        return;
      }
      case "gap":
        lastCard = null;
        // draft 가 source 없이 끝나 남았다면(드뭄) 흔적 정리
        if (draftCard) {
          draftCard.remove();
          draftCard = null;
        }
        return;
      case "end": {
        const card = newCard();
        card.innerHTML = `<div class="info">— 회의 종료 —</div>`;
        publisherConnected = false;
        connEl.textContent = "🛑 publisher ended";
        connEl.className = "conn bad";
        break;
      }
      case "kicked": {
        const card = newCard();
        card.innerHTML = `<div class="info">— 새 publisher 가 채널을 인수했습니다 —</div>`;
        break;
      }
      case "publisher_disconnected": {
        publisherConnected = false;
        connEl.textContent = "⏸ publisher 연결 끊김";
        connEl.className = "conn bad";
        return;
      }
      case "mic_source": {
        const src = ev.source === "remote" ? "🎚️ 원격(폰)" : "🎚️ 시스템";
        const badge = document.getElementById("mic-src");
        badge.textContent = src;
        badge.classList.toggle("remote", ev.source === "remote");
        break;
      }
      default:
        return;
    }
    scrollIfLocked();
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, (c) => ({
      "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
    }[c]));
  }

  let ws = null;
  let reconnectDelay = 500;

  function connect() {
    const proto = location.protocol === "https:" ? "wss:" : "ws:";
    ws = new WebSocket(`${proto}//${location.host}/subscribe/${encodeURIComponent(key)}`);
    connEl.textContent = "연결 중…";
    connEl.className = "conn";

    ws.addEventListener("open", () => {
      publisherConnected = true;
      connEl.textContent = "● live";
      connEl.className = "conn ok";
      reconnectDelay = 500;
    });
    ws.addEventListener("message", (m) => {
      try {
        const ev = JSON.parse(m.data);
        handle(ev);
      } catch (e) {
        console.error("bad message", e, m.data);
      }
    });
    ws.addEventListener("close", () => {
      connEl.textContent = `재연결 중 (${reconnectDelay/1000}s)…`;
      connEl.className = "conn bad";
      setTimeout(connect, reconnectDelay);
      reconnectDelay = Math.min(reconnectDelay * 2, 8000);
    });
    ws.addEventListener("error", () => {
      try { ws.close(); } catch {}
    });
  }

  // ---- admin 인증 + mic 캡처 ----
  const ADMIN_KEY = "jarvis_admin_pw";
  const TARGET_SR = 16000;
  let micWS = null, micCtx = null, micNode = null, micStream = null, micOn = false;

  const adminToggle = document.getElementById("admin-toggle");
  const adminPw = document.getElementById("admin-pw");
  const adminUnlock = document.getElementById("admin-unlock");
  const micToggle = document.getElementById("mic-toggle");
  const micLevel = document.getElementById("mic-level");

  function showAdminControls() {
    micToggle.classList.remove("admin-hidden");
    adminPw.classList.add("admin-hidden");
    adminUnlock.classList.add("admin-hidden");
    adminToggle.textContent = "🔓 admin";
  }
  function getPw() { return localStorage.getItem(ADMIN_KEY) || ""; }

  adminToggle.addEventListener("click", () => {
    if (getPw()) { showAdminControls(); return; }   // 이미 해제됨
    adminPw.classList.toggle("admin-hidden");
    adminUnlock.classList.toggle("admin-hidden");
  });
  adminUnlock.addEventListener("click", () => {
    const pw = adminPw.value.trim();
    if (!pw) return;
    localStorage.setItem(ADMIN_KEY, pw);
    showAdminControls();
  });
  if (getPw()) showAdminControls();   // 재방문 자동 해제

  function downsample(input, inRate) {
    if (inRate === TARGET_SR) return input;
    const ratio = inRate / TARGET_SR;
    const outLen = Math.floor(input.length / ratio);
    const out = new Float32Array(outLen);
    for (let i = 0; i < outLen; i++) out[i] = input[Math.floor(i * ratio)];
    return out;
  }
  function floatToInt16(f32) {
    const out = new Int16Array(f32.length);
    for (let i = 0; i < f32.length; i++) {
      const s = Math.max(-1, Math.min(1, f32[i]));
      out[i] = s < 0 ? s * 0x8000 : s * 0x7fff;
    }
    return out;
  }

  // 마이크를 비자발적으로 잃었을 때 정리 + UI 리셋 + 알림 (last-wins 로 밀려남 등)
  function loseMic(msg) {
    micStop();
    micOn = false;
    micToggle.textContent = "🎙️ 마이크 켜기";
    micToggle.classList.remove("off");
    if (msg) alert(msg);
  }

  async function micStart() {
    const pw = getPw();
    if (!pw) return;
    const proto = location.protocol === "https:" ? "wss:" : "ws:";
    micWS = new WebSocket(`${proto}//${location.host}/mic/${encodeURIComponent(key)}?token=${encodeURIComponent(pw)}`);
    micWS.binaryType = "arraybuffer";
    micWS.onopen = () => { micWS.send(JSON.stringify({ kind: "mic_start" })); };
    micWS.onmessage = (e) => {
      // 다른 기기가 마이크를 인수하면 relay 가 kicked 를 보낸다
      try { if (JSON.parse(e.data).kind === "kicked") loseMic("다른 기기가 마이크를 가져갔습니다."); } catch {}
    };
    micWS.onclose = (e) => {
      if (e.code === 1006 || e.code === 1008) {
        localStorage.removeItem(ADMIN_KEY);
        adminToggle.textContent = "🔒 admin";
        micToggle.classList.add("admin-hidden");
        loseMic("admin 인증 실패 — 비밀번호를 다시 입력하세요.");
      } else if (micOn) {
        // 사용자가 끈 게 아닌데 닫힘 = 외부 요인으로 마이크를 잃음(kicked 메시지 유실 등)
        loseMic("마이크 연결이 종료되었습니다 (다른 기기가 가져갔을 수 있음).");
      }
    };
    micStream = await navigator.mediaDevices.getUserMedia({ audio: { channelCount: 1, echoCancellation: true, noiseSuppression: true } });
    micCtx = new (window.AudioContext || window.webkitAudioContext)();
    const srcNode = micCtx.createMediaStreamSource(micStream);
    micNode = micCtx.createScriptProcessor(4096, 1, 1);
    srcNode.connect(micNode);
    micNode.connect(micCtx.destination);
    micLevel.classList.remove("admin-hidden");
    micNode.onaudioprocess = (ev) => {
      const inp = ev.inputBuffer.getChannelData(0);
      let peak = 0; for (let i = 0; i < inp.length; i++) peak = Math.max(peak, Math.abs(inp[i]));
      document.getElementById("mic-bar").style.width = Math.min(100, peak * 140) + "%";
      if (!micWS || micWS.readyState !== 1) return;
      micWS.send(floatToInt16(downsample(inp, micCtx.sampleRate)).buffer);
    };
  }
  function micStop() {
    try { if (micWS && micWS.readyState === 1) micWS.send(JSON.stringify({ kind: "mic_stop" })); } catch {}
    if (micNode) { micNode.disconnect(); micNode.onaudioprocess = null; micNode = null; }
    if (micCtx) { micCtx.close(); micCtx = null; }
    if (micStream) { micStream.getTracks().forEach((t) => t.stop()); micStream = null; }
    if (micWS) { try { micWS.close(); } catch {} micWS = null; }
    document.getElementById("mic-bar").style.width = "0%";
    micLevel.classList.add("admin-hidden");
  }
  micToggle.addEventListener("click", async () => {
    micOn = !micOn;
    micToggle.textContent = micOn ? "🎙️ 마이크 끄기" : "🎙️ 마이크 켜기";
    micToggle.classList.toggle("off", micOn);
    if (micOn) {
      try { await micStart(); }
      catch (e) { alert("마이크 권한 실패: " + e.message); micOn = false; micToggle.textContent = "🎙️ 마이크 켜기"; micToggle.classList.remove("off"); }
    } else micStop();
  });

  if (!key) {
    titleEl.textContent = "회의 키가 URL 에 없습니다.";
  } else {
    connect();
  }
})();
</script>
</body>
</html>
